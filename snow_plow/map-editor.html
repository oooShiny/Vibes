<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Map Editor</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a1a; color:#ccc; font-family:'Courier New',monospace; overflow:hidden; display:flex; flex-direction:column; height:100vh; }

/* ── TOOLBAR ── */
#toolbar {
  height:48px; background:#111; border-bottom:1px solid #2a2a2a;
  display:flex; align-items:center; gap:0; flex-shrink:0; overflow-x:auto;
}
#toolbar-title { padding:0 16px; font-size:11px; letter-spacing:0.2em; color:#fff; text-transform:uppercase; border-right:1px solid #2a2a2a; white-space:nowrap; }
.tool-group { display:flex; align-items:center; padding:0 10px; border-right:1px solid #222; gap:4px; }
.tool-group-label { font-size:8px; color:#444; letter-spacing:0.12em; text-transform:uppercase; margin-right:4px; }
.tool-btn {
  padding:5px 10px; border-radius:3px; border:1px solid #2a2a2a;
  background:#1a1a1a; color:#888; font-family:'Courier New',monospace;
  font-size:9px; letter-spacing:0.08em; cursor:pointer; text-transform:uppercase;
  transition:all 0.1s; white-space:nowrap;
}
.tool-btn:hover { background:#222; color:#ccc; }
.tool-btn.active { background:#1d3a5c; border-color:#2a5a8a; color:#fff; }
.tool-btn.danger { color:#853; }
.tool-btn.danger:hover { background:#2a1a1a; color:#e74c3c; }
.tool-btn.success { background:#1a3a1a; border-color:#2a6a2a; color:#4aaa4a; }
.tool-btn.success:hover { background:#2a5a2a; }

/* Tile palette */
.tile-swatch {
  width:28px; height:28px; border-radius:3px; cursor:pointer;
  border:2px solid transparent; transition:border-color 0.1s;
  position:relative; flex-shrink:0;
}
.tile-swatch:hover { border-color:rgba(255,255,255,0.3); }
.tile-swatch.active { border-color:#fff; }
.tile-swatch[title]:hover::after {
  content:attr(title); position:absolute; top:32px; left:50%; transform:translateX(-50%);
  background:#000; color:#fff; font-size:9px; padding:2px 6px; border-radius:2px;
  white-space:nowrap; pointer-events:none; z-index:100;
}

/* Sliders */
.tool-slider { display:flex; align-items:center; gap:6px; }
.tool-slider label { font-size:9px; color:#666; }
.tool-slider input[type=range] { width:70px; height:2px; accent-color:#3498db; }
.tool-slider span { font-size:9px; color:#3498db; width:28px; }

/* ── MAIN AREA ── */
#main { display:flex; flex:1; overflow:hidden; }

/* ── CANVAS AREA ── */
#canvas-wrap { flex:1; position:relative; overflow:hidden; background:#0d0d0d; cursor:crosshair; }
#map-canvas { position:absolute; top:0; left:0; image-rendering:pixelated; }
#overlay-canvas { position:absolute; top:0; left:0; pointer-events:none; }
#coords { position:absolute; bottom:8px; left:8px; font-size:9px; color:rgba(255,255,255,0.3); letter-spacing:0.08em; pointer-events:none; }
#zoom-level { position:absolute; bottom:8px; right:8px; font-size:9px; color:rgba(255,255,255,0.2); pointer-events:none; }

/* ── SIDEBAR ── */
#sidebar {
  width:240px; flex-shrink:0; background:#141414; border-left:1px solid #222;
  display:flex; flex-direction:column; overflow:hidden;
}
.side-section { border-bottom:1px solid #1e1e1e; padding:12px 14px; }
.side-label { font-size:8px; letter-spacing:0.15em; color:#555; text-transform:uppercase; margin-bottom:8px; }
.side-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.side-row label { font-size:9px; color:#888; flex:1; }
.side-row input[type=range] { flex:2; height:2px; accent-color:#e67e22; }
.side-row span { font-size:9px; color:#e67e22; width:32px; text-align:right; }
.side-row input[type=file] { display:none; }
.file-btn {
  width:100%; padding:7px; background:#1a1a1a; border:1px solid #2a2a2a;
  border-radius:3px; color:#888; font-family:'Courier New',monospace; font-size:9px;
  letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; text-align:center;
  transition:all 0.1s;
}
.file-btn:hover { background:#222; color:#ccc; }
#sat-preview { width:100%; aspect-ratio:16/9; background:#0d0d0d; border:1px solid #1e1e1e; border-radius:2px; object-fit:cover; display:none; margin-bottom:6px; }

/* Map size */
.size-input { width:52px; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:2px; color:#ccc; font-family:'Courier New',monospace; font-size:10px; padding:3px 6px; text-align:center; }

/* Stats */
.stat-row { display:flex; justify-content:space-between; margin-bottom:3px; }
.stat-label { font-size:9px; color:#555; }
.stat-val { font-size:9px; color:#888; }

/* Building panel */
.bld-mode-hint { font-size:9px; color:#555; line-height:1.6; }
.bld-row { display:flex; align-items:center; gap:6px; margin-bottom:5px; }
.bld-row label { font-size:9px; color:#777; width:60px; }
.bld-row input[type=range] { flex:1; height:2px; accent-color:#9b59b6; }
.bld-row span { font-size:9px; color:#9b59b6; width:28px; text-align:right; }

#actions { padding:12px 14px; margin-top:auto; display:flex; flex-direction:column; gap:6px; }
.action-btn {
  width:100%; padding:8px; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:3px;
  color:#777; font-family:'Courier New',monospace; font-size:9px; letter-spacing:0.12em;
  text-transform:uppercase; cursor:pointer; transition:all 0.1s;
}
.action-btn:hover { background:#222; color:#ccc; }
.action-btn.primary { background:#1a3a1a; border-color:#2a6a2a; color:#4aaa4a; }
.action-btn.primary:hover { background:#2a5a2a; }
.action-btn.secondary { background:#1a1a3a; border-color:#2a2a6a; color:#4a6aaa; }
.action-btn.secondary:hover { background:#2a2a5a; }

/* Toast */
#toast {
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  background:#1a3a1a; border:1px solid #2a6a2a; color:#4aaa4a;
  font-family:'Courier New',monospace; font-size:10px; letter-spacing:0.1em;
  padding:8px 16px; border-radius:4px; z-index:999;
  opacity:0; transition:opacity 0.3s; pointer-events:none;
}
</style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
  <div id="toolbar-title">Map Editor</div>

  <div class="tool-group">
    <span class="tool-group-label">Tool</span>
    <button class="tool-btn active" id="tool-paint" title="Paint tiles">Paint</button>
    <button class="tool-btn" id="tool-erase" title="Erase to grass">Erase</button>
    <button class="tool-btn" id="tool-building" title="Place buildings">Building</button>
    <button class="tool-btn" id="tool-spawn" title="Set spawn point">Spawn</button>
    <button class="tool-btn" id="tool-pan" title="Pan view (or hold Space)">Pan</button>
  </div>

  <div class="tool-group">
    <span class="tool-group-label">Tile</span>
    <div class="tile-swatch active" id="swatch-grass"     title="Grass"       style="background:#4a7a3a" data-tile="G"></div>
    <div class="tile-swatch"        id="swatch-road"      title="Road"        style="background:#555560" data-tile="R"></div>
    <div class="tile-swatch"        id="swatch-sidewalk"  title="Sidewalk"    style="background:#8a8a7a" data-tile="S"></div>
    <div class="tile-swatch"        id="swatch-driveway"  title="Driveway"    style="background:#6a6a58" data-tile="D"></div>
    <div class="tile-swatch"        id="swatch-parking"   title="Parking Lot" style="background:#48484f" data-tile="P"></div>
    <div class="tile-swatch"        id="swatch-house"     title="House Footprint (no snow)" style="background:#7a5a3a" data-tile="H"></div>
  </div>

  <div class="tool-group">
    <span class="tool-group-label">Brush</span>
    <div class="tool-slider">
      <label>Size</label>
      <input type="range" id="brush-size" min="1" max="9" step="2" value="1">
      <span id="brush-size-val">1</span>
    </div>
  </div>

  <div class="tool-group">
    <span class="tool-group-label">View</span>
    <button class="tool-btn" id="btn-grid">Grid</button>
    <button class="tool-btn" id="btn-zoom-in">+</button>
    <button class="tool-btn" id="btn-zoom-out">−</button>
    <button class="tool-btn" id="btn-fit">Fit</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="canvas-wrap">
    <canvas id="map-canvas"></canvas>
    <canvas id="overlay-canvas"></canvas>
    <div id="coords">col 0, row 0</div>
    <div id="zoom-level">100%</div>
  </div>

  <div id="sidebar">

    <div class="side-section">
      <div class="side-label">Satellite Image</div>
      <img id="sat-preview" alt="preview">
      <label class="file-btn" for="sat-upload">↑ Upload Image</label>
      <input type="file" id="sat-upload" accept="image/*">
      <div class="side-row" style="margin-top:8px">
        <label>Opacity</label>
        <input type="range" id="sat-opacity" min="0" max="100" value="50">
        <span id="sat-opacity-val">50%</span>
      </div>
      <div id="sat-transform" style="display:none;margin-top:4px">
        <div class="side-label" style="margin-top:6px">Transform</div>
        <div class="img-transform-row">
          <label>Rotation</label>
          <input type="range" id="sat-rot" min="0" max="360" step="1" value="0">
          <span id="sat-rot-val">0°</span>
        </div>
        <div class="img-transform-row">
          <label>Scale</label>
          <input type="range" id="sat-scale" min="20" max="300" step="1" value="100">
          <span id="sat-scale-val">100%</span>
        </div>
        <div class="img-transform-row">
          <label>Offset X</label>
          <input type="range" id="sat-ox" min="-100" max="100" step="1" value="0">
          <span id="sat-ox-val">0%</span>
        </div>
        <div class="img-transform-row">
          <label>Offset Y</label>
          <input type="range" id="sat-oy" min="-100" max="100" step="1" value="0">
          <span id="sat-oy-val">0%</span>
        </div>
        <div style="display:flex;gap:5px;margin-top:6px">
          <button class="img-btn" id="sat-rot-ccw">↺ 90°</button>
          <button class="img-btn" id="sat-rot-cw">↻ 90°</button>
          <button class="img-btn" id="sat-reset">Reset</button>
        </div>
      </div>
    </div>

    <div class="side-section">
      <div class="side-label">Map Size</div>
      <div class="side-row">
        <label>Cols</label>
        <input type="number" class="size-input" id="map-cols" value="100" min="20" max="200">
      </div>
      <div class="side-row">
        <label>Rows</label>
        <input type="number" class="size-input" id="map-rows" value="100" min="20" max="200">
      </div>
      <div class="side-row">
        <label>Tile (m)</label>
        <input type="number" class="size-input" id="tile-size" value="1.5" min="0.5" max="4" step="0.5">
      </div>
      <button class="file-btn" id="resize-btn" style="margin-top:4px">Apply Size</button>
    </div>

    <div class="side-section" id="building-panel" style="display:none">
      <div class="side-label">Building</div>
      <div class="bld-row"><label>Width (m)</label><input type="range" id="bld-w" min="4" max="20" step="1" value="8"><span id="bld-w-val">8</span></div>
      <div class="bld-row"><label>Depth (m)</label><input type="range" id="bld-d" min="4" max="20" step="1" value="6"><span id="bld-d-val">6</span></div>
      <div class="bld-row"><label>Rotation</label><input type="range" id="bld-rot" min="0" max="3" step="1" value="0"><span id="bld-rot-val">0°</span></div>
      <div class="bld-mode-hint" style="margin-top:4px">Click on the map to place a building. Right-click a placed building to delete it.</div>
    </div>

    <div class="side-section">
      <div class="side-label">Stats</div>
      <div class="stat-row"><span class="stat-label">Road tiles</span><span class="stat-val" id="stat-road">0</span></div>
      <div class="stat-row"><span class="stat-label">Driveway tiles</span><span class="stat-val" id="stat-drive">0</span></div>
      <div class="stat-row"><span class="stat-label">Parking tiles</span><span class="stat-val" id="stat-park">0</span></div>
      <div class="stat-row"><span class="stat-label">Buildings</span><span class="stat-val" id="stat-bld">0</span></div>
      <div class="stat-row"><span class="stat-label">Map size</span><span class="stat-val" id="stat-size">—</span></div>
    </div>

    <div id="actions">
      <button class="action-btn secondary" id="btn-load-map">↑ Load map.json</button>
      <input type="file" id="map-upload" accept=".json" style="display:none">
      <button class="action-btn primary" id="btn-export">↓ Export map.json</button>
      <button class="action-btn danger" id="btn-clear" style="color:#853">Clear All</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

// ── TILE DEFINITIONS ─────────────────────────────────────────
const TILES = {
  G: { label:'Grass',     color:'#4a7a3a', snow:true,  snowType:1, weight:1.0, height:0.55, score:false },
  R: { label:'Road',      color:'#555560', snow:true,  snowType:2, weight:3.5, height:0.3,  score:false },
  S: { label:'Sidewalk',  color:'#8a8a7a', snow:true,  snowType:2, weight:2.5, height:0.25, score:false },
  D: { label:'Driveway',  color:'#6a6a58', snow:true,  snowType:2, weight:3.5, height:0.3,  score:true  },
  P: { label:'Parking',   color:'#48484f', snow:true,  snowType:2, weight:3.5, height:0.3,  score:true  },
  H: { label:'House',     color:'#7a5a3a', snow:false, snowType:0, weight:0,   height:0,    score:false },
};

// ── STATE ─────────────────────────────────────────────────────
let COLS = 100, ROWS = 100, TILE_SIZE = 1.5;
let tiles = new Uint8Array(COLS * ROWS); // char codes
let buildings = []; // { col, row, w, d, rot }
let spawnPoint = { col: Math.floor(COLS/2), row: Math.floor(ROWS/2), angle: 0 };

// Fill with grass
tiles.fill('G'.charCodeAt(0));

// ── VIEW STATE ────────────────────────────────────────────────
let zoom = 6; // pixels per tile
let panX = 0, panY = 0;
let showGrid = true;
let satImage = null;
let satOpacity = 0.5;
let satRotation = 0;   // degrees
let satScale = 100;    // percent
let satOffsetX = 0;    // percent of map width
let satOffsetY = 0;    // percent of map height

// ── TOOL STATE ────────────────────────────────────────────────
let currentTool = 'paint';
let currentTile = 'G';
let brushSize = 1;
let isPainting = false;
let isPanning = false;
let panStart = { x: 0, y: 0, px: 0, py: 0 };
let spaceDown = false;

// ── CANVAS SETUP ─────────────────────────────────────────────
const canvasWrap = document.getElementById('canvas-wrap');
const mapCanvas  = document.getElementById('map-canvas');
const overCanvas = document.getElementById('overlay-canvas');
const ctx  = mapCanvas.getContext('2d');
const octx = overCanvas.getContext('2d');

function resizeCanvases() {
  const w = canvasWrap.clientWidth;
  const h = canvasWrap.clientHeight;
  mapCanvas.width  = overCanvas.width  = w;
  mapCanvas.height = overCanvas.height = h;
  render();
}
window.addEventListener('resize', resizeCanvases);

// ── COORDINATE TRANSFORMS ─────────────────────────────────────
function tileToScreen(col, row) {
  return { x: panX + col * zoom, y: panY + row * zoom };
}
function screenToTile(sx, sy) {
  return {
    col: Math.floor((sx - panX) / zoom),
    row: Math.floor((sy - panY) / zoom),
  };
}
function clampTile(col, row) {
  return { col: Math.max(0, Math.min(COLS-1, col)), row: Math.max(0, Math.min(ROWS-1, row)) };
}

// ── FIT VIEW ─────────────────────────────────────────────────
function fitView() {
  const w = canvasWrap.clientWidth, h = canvasWrap.clientHeight;
  const zoomFit = Math.min(w / COLS, h / ROWS);
  zoom = Math.max(2, Math.min(40, zoomFit * 0.9));
  panX = (w - COLS * zoom) / 2;
  panY = (h - ROWS * zoom) / 2;
  render();
}

// ── RENDER ────────────────────────────────────────────────────
function render() {
  const w = mapCanvas.width, h = mapCanvas.height;
  ctx.clearRect(0, 0, w, h);

  // Satellite image with transform
  if (satImage) {
    const mapW = COLS * zoom, mapH = ROWS * zoom;
    const cx = panX + mapW / 2, cy = panY + mapH / 2;
    const scale = satScale / 100;
    const ox = (satOffsetX / 100) * mapW;
    const oy = (satOffsetY / 100) * mapH;
    ctx.save();
    ctx.globalAlpha = satOpacity;
    ctx.translate(cx + ox, cy + oy);
    ctx.rotate(satRotation * Math.PI / 180);
    ctx.drawImage(satImage, -mapW * scale / 2, -mapH * scale / 2, mapW * scale, mapH * scale);
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  // Tiles
  for (let row = 0; row < ROWS; row++) {
    for (let col = 0; col < COLS; col++) {
      const ch = String.fromCharCode(tiles[row * COLS + col]);
      const def = TILES[ch] || TILES.G;
      ctx.fillStyle = def.color;
      ctx.globalAlpha = satImage ? 0.72 : 1.0;
      ctx.fillRect(panX + col * zoom, panY + row * zoom, zoom, zoom);
      ctx.globalAlpha = 1;
    }
  }

  // Grid
  if (showGrid && zoom >= 4) {
    ctx.strokeStyle = 'rgba(0,0,0,0.18)';
    ctx.lineWidth = 0.5;
    for (let col = 0; col <= COLS; col++) {
      const x = panX + col * zoom;
      ctx.beginPath(); ctx.moveTo(x, panY); ctx.lineTo(x, panY + ROWS * zoom); ctx.stroke();
    }
    for (let row = 0; row <= ROWS; row++) {
      const y = panY + row * zoom;
      ctx.beginPath(); ctx.moveTo(panX, y); ctx.lineTo(panX + COLS * zoom, y); ctx.stroke();
    }
  }

  // Buildings
  buildings.forEach((b, bi) => {
    const sx = panX + b.col * zoom;
    const sy = panY + b.row * zoom;
    const sw = (b.w / TILE_SIZE) * zoom;
    const sd = (b.d / TILE_SIZE) * zoom;
    ctx.fillStyle = 'rgba(120,80,50,0.7)';
    ctx.fillRect(sx, sy, sw, sd);
    ctx.strokeStyle = '#c8a060';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(sx, sy, sw, sd);
    // Label
    if (zoom >= 5) {
      ctx.fillStyle = '#f0c080';
      ctx.font = `${Math.max(8, zoom * 0.5)}px Courier New`;
      ctx.textAlign = 'center';
      ctx.fillText('B', sx + sw/2, sy + sd/2 + 3);
    }
  });

  // Spawn point
  {
    const sx = panX + (spawnPoint.col + 0.5) * zoom;
    const sy = panY + (spawnPoint.row + 0.5) * zoom;
    ctx.beginPath();
    ctx.arc(sx, sy, Math.max(4, zoom * 0.4), 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(52,152,219,0.7)';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    if (zoom >= 6) {
      ctx.fillStyle = '#fff';
      ctx.font = `${Math.max(7, zoom * 0.4)}px Courier New`;
      ctx.textAlign = 'center';
      ctx.fillText('S', sx, sy + 3);
    }
  }

  document.getElementById('zoom-level').textContent = Math.round(zoom / 6 * 100) + '%';
  updateStats();
}

// ── OVERLAY (cursor preview) ──────────────────────────────────
function renderOverlay(col, row) {
  octx.clearRect(0, 0, overCanvas.width, overCanvas.height);
  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return;

  const half = Math.floor(brushSize / 2);
  const sx = panX + (col - half) * zoom;
  const sy = panY + (row - half) * zoom;
  const sz = brushSize * zoom;

  if (currentTool === 'paint') {
    const def = TILES[currentTile];
    octx.fillStyle = def ? def.color + '88' : '#ffffff44';
    octx.fillRect(sx, sy, sz, sz);
    octx.strokeStyle = '#fff';
    octx.lineWidth = 1;
    octx.strokeRect(sx, sy, sz, sz);
  } else if (currentTool === 'erase') {
    octx.strokeStyle = '#e74c3c';
    octx.lineWidth = 1.5;
    octx.strokeRect(sx, sy, sz, sz);
  } else if (currentTool === 'building') {
    const bw = parseFloat(document.getElementById('bld-w').value);
    const bd = parseFloat(document.getElementById('bld-d').value);
    const sw = (bw / TILE_SIZE) * zoom;
    const sd = (bd / TILE_SIZE) * zoom;
    const bsx = panX + col * zoom;
    const bsy = panY + row * zoom;
    octx.fillStyle = 'rgba(155,89,182,0.4)';
    octx.fillRect(bsx, bsy, sw, sd);
    octx.strokeStyle = '#9b59b6';
    octx.lineWidth = 1.5;
    octx.strokeRect(bsx, bsy, sw, sd);
  } else if (currentTool === 'spawn') {
    const cx = panX + (col + 0.5) * zoom;
    const cy = panY + (row + 0.5) * zoom;
    octx.beginPath();
    octx.arc(cx, cy, Math.max(4, zoom * 0.4), 0, Math.PI * 2);
    octx.fillStyle = 'rgba(52,152,219,0.5)';
    octx.fill();
    octx.strokeStyle = '#3498db';
    octx.lineWidth = 1.5;
    octx.stroke();
  }
}

// ── PAINT ─────────────────────────────────────────────────────
function paintAt(col, row) {
  const half = Math.floor(brushSize / 2);
  for (let dc = -half; dc <= half; dc++) {
    for (let dr = -half; dr <= half; dr++) {
      const c = col + dc, r = row + dr;
      if (c < 0 || c >= COLS || r < 0 || r >= ROWS) continue;
      const ch = currentTool === 'erase' ? 'G' : currentTile;
      tiles[r * COLS + c] = ch.charCodeAt(0);
    }
  }
  render();
}

// ── INPUT HANDLING ────────────────────────────────────────────
function getCanvasPos(e) {
  const rect = canvasWrap.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

canvasWrap.addEventListener('mousedown', e => {
  const pos = getCanvasPos(e);
  const { col, row } = screenToTile(pos.x, pos.y);

  if (e.button === 1 || spaceDown || currentTool === 'pan') {
    isPanning = true;
    panStart = { x: pos.x, y: pos.y, px: panX, py: panY };
    canvasWrap.style.cursor = 'grabbing';
    return;
  }

  if (e.button === 2) {
    // Right click — delete building under cursor
    const bi = buildings.findIndex(b => {
      const bwTiles = b.w / TILE_SIZE, bdTiles = b.d / TILE_SIZE;
      return col >= b.col && col < b.col + bwTiles && row >= b.row && row < b.row + bdTiles;
    });
    if (bi >= 0) { buildings.splice(bi, 1); render(); }
    return;
  }

  if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return;

  if (currentTool === 'building') {
    const bw = parseFloat(document.getElementById('bld-w').value);
    const bd = parseFloat(document.getElementById('bld-d').value);
    const rot = parseInt(document.getElementById('bld-rot').value);
    buildings.push({ col, row, w: bw, d: bd, rot });
    render();
    return;
  }

  if (currentTool === 'spawn') {
    spawnPoint = { col, row, angle: 0 };
    render();
    return;
  }

  if (currentTool === 'paint' || currentTool === 'erase') {
    isPainting = true;
    paintAt(col, row);
  }
});

window.addEventListener('mousemove', e => {
  const pos = getCanvasPos(e);
  const { col, row } = screenToTile(pos.x, pos.y);

  document.getElementById('coords').textContent =
    `col ${col}, row ${row}  (${(col * TILE_SIZE - (COLS/2)*TILE_SIZE).toFixed(1)}m, ${(row * TILE_SIZE - (ROWS/2)*TILE_SIZE).toFixed(1)}m)`;

  if (isPanning) {
    panX = panStart.px + (pos.x - panStart.x);
    panY = panStart.py + (pos.y - panStart.y);
    render();
  } else if (isPainting && (currentTool === 'paint' || currentTool === 'erase')) {
    paintAt(col, row);
  }
  renderOverlay(col, row);
});

window.addEventListener('mouseup', () => {
  isPainting = false;
  isPanning = false;
  canvasWrap.style.cursor = spaceDown ? 'grab' : 'crosshair';
});

canvasWrap.addEventListener('wheel', e => {
  e.preventDefault();
  const pos = getCanvasPos(e);
  const { col, row } = screenToTile(pos.x, pos.y);
  const factor = e.deltaY < 0 ? 1.15 : 0.87;
  const newZoom = Math.max(2, Math.min(48, zoom * factor));
  panX = pos.x - col * newZoom;
  panY = pos.y - row * newZoom;
  zoom = newZoom;
  render();
}, { passive: false });

canvasWrap.addEventListener('contextmenu', e => e.preventDefault());

window.addEventListener('keydown', e => {
  if (e.code === 'Space') { spaceDown = true; canvasWrap.style.cursor = 'grab'; e.preventDefault(); }
  if (e.code === 'KeyG') toggleGrid();
  if (e.code === 'KeyP') setTool('paint');
  if (e.code === 'KeyE') setTool('erase');
  if (e.code === 'KeyB') setTool('building');
  if (e.key === '=' || e.key === '+') zoomIn();
  if (e.key === '-') zoomOut();
});
window.addEventListener('keyup', e => {
  if (e.code === 'Space') { spaceDown = false; canvasWrap.style.cursor = 'crosshair'; }
});

// ── TOOLBAR BUTTONS ───────────────────────────────────────────
function setTool(t) {
  currentTool = t;
  document.querySelectorAll('[id^=tool-]').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('tool-' + t);
  if (btn) btn.classList.add('active');
  document.getElementById('building-panel').style.display = t === 'building' ? 'block' : 'none';
  canvasWrap.style.cursor = t === 'pan' ? 'grab' : 'crosshair';
}
['paint','erase','building','spawn','pan'].forEach(t => {
  document.getElementById('tool-' + t).addEventListener('click', () => setTool(t));
});

// Tile swatches
document.querySelectorAll('.tile-swatch').forEach(sw => {
  sw.addEventListener('click', () => {
    document.querySelectorAll('.tile-swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    currentTile = sw.dataset.tile;
    if (currentTool !== 'erase' && currentTool !== 'building' && currentTool !== 'spawn' && currentTool !== 'pan') {
      setTool('paint');
    }
  });
});

// Brush size
document.getElementById('brush-size').addEventListener('input', e => {
  brushSize = parseInt(e.target.value);
  document.getElementById('brush-size-val').textContent = brushSize;
});

// Grid toggle
function toggleGrid() {
  showGrid = !showGrid;
  document.getElementById('btn-grid').classList.toggle('active', showGrid);
  render();
}
document.getElementById('btn-grid').classList.add('active');
document.getElementById('btn-grid').addEventListener('click', toggleGrid);

function zoomIn() {
  const cx = canvasWrap.clientWidth / 2, cy = canvasWrap.clientHeight / 2;
  const { col, row } = screenToTile(cx, cy);
  zoom = Math.min(48, zoom * 1.2);
  panX = cx - col * zoom; panY = cy - row * zoom;
  render();
}
function zoomOut() {
  const cx = canvasWrap.clientWidth / 2, cy = canvasWrap.clientHeight / 2;
  const { col, row } = screenToTile(cx, cy);
  zoom = Math.max(2, zoom / 1.2);
  panX = cx - col * zoom; panY = cy - row * zoom;
  render();
}
document.getElementById('btn-zoom-in').addEventListener('click', zoomIn);
document.getElementById('btn-zoom-out').addEventListener('click', zoomOut);
document.getElementById('btn-fit').addEventListener('click', fitView);

// ── SATELLITE IMAGE ───────────────────────────────────────────
document.getElementById('sat-upload').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    satImage = img;
    const preview = document.getElementById('sat-preview');
    preview.src = url;
    preview.style.display = 'block';
    document.getElementById('sat-transform').style.display = 'block';
    render();
  };
  img.src = url;
});

// Transform controls
function updateTransformSlider(id, valId, suffix, varSetter) {
  document.getElementById(id).addEventListener('input', e => {
    varSetter(parseFloat(e.target.value));
    document.getElementById(valId).textContent = e.target.value + suffix;
    render();
  });
}
updateTransformSlider('sat-rot',   'sat-rot-val',   '°', v => satRotation = v);
updateTransformSlider('sat-scale', 'sat-scale-val', '%', v => satScale = v);
updateTransformSlider('sat-ox',    'sat-ox-val',    '%', v => satOffsetX = v);
updateTransformSlider('sat-oy',    'sat-oy-val',    '%', v => satOffsetY = v);

document.getElementById('sat-rot-ccw').addEventListener('click', () => {
  satRotation = ((satRotation - 90) + 360) % 360;
  document.getElementById('sat-rot').value = satRotation;
  document.getElementById('sat-rot-val').textContent = satRotation + '°';
  render();
});
document.getElementById('sat-rot-cw').addEventListener('click', () => {
  satRotation = (satRotation + 90) % 360;
  document.getElementById('sat-rot').value = satRotation;
  document.getElementById('sat-rot-val').textContent = satRotation + '°';
  render();
});
document.getElementById('sat-reset').addEventListener('click', () => {
  satRotation = 0; satScale = 100; satOffsetX = 0; satOffsetY = 0;
  document.getElementById('sat-rot').value = 0;
  document.getElementById('sat-rot-val').textContent = '0°';
  document.getElementById('sat-scale').value = 100;
  document.getElementById('sat-scale-val').textContent = '100%';
  document.getElementById('sat-ox').value = 0;
  document.getElementById('sat-ox-val').textContent = '0%';
  document.getElementById('sat-oy').value = 0;
  document.getElementById('sat-oy-val').textContent = '0%';
  render();
});

document.getElementById('sat-opacity').addEventListener('input', e => {
  satOpacity = parseInt(e.target.value) / 100;
  document.getElementById('sat-opacity-val').textContent = e.target.value + '%';
  render();
});

// ── MAP SIZE ──────────────────────────────────────────────────
document.getElementById('resize-btn').addEventListener('click', () => {
  const newCols = parseInt(document.getElementById('map-cols').value);
  const newRows = parseInt(document.getElementById('map-rows').value);
  const newTile = parseFloat(document.getElementById('tile-size').value);
  if (!confirm(`Resize to ${newCols}×${newRows}? Painted tiles outside the new bounds will be lost.`)) return;

  const newTiles = new Uint8Array(newCols * newRows).fill('G'.charCodeAt(0));
  const minC = Math.min(COLS, newCols), minR = Math.min(ROWS, newRows);
  for (let r = 0; r < minR; r++)
    for (let c = 0; c < minC; c++)
      newTiles[r * newCols + c] = tiles[r * COLS + c];

  COLS = newCols; ROWS = newRows; TILE_SIZE = newTile;
  tiles = newTiles;
  spawnPoint = { col: Math.floor(COLS/2), row: Math.floor(ROWS/2), angle: 0 };
  buildings = buildings.filter(b => b.col < COLS && b.row < ROWS);
  fitView();
});

// ── BUILDING SLIDERS ─────────────────────────────────────────
[['bld-w','bld-w-val','m'],['bld-d','bld-d-val','m'],['bld-rot','bld-rot-val','°']].forEach(([id, vid, suffix]) => {
  document.getElementById(id).addEventListener('input', e => {
    const v = e.target.value;
    document.getElementById(vid).textContent = suffix === '°' ? (parseInt(v) * 90) + '°' : v + suffix;
  });
});

// ── STATS ─────────────────────────────────────────────────────
function updateStats() {
  let road = 0, drive = 0, park = 0;
  for (let i = 0; i < tiles.length; i++) {
    const ch = String.fromCharCode(tiles[i]);
    if (ch === 'R') road++;
    else if (ch === 'D') drive++;
    else if (ch === 'P') park++;
  }
  document.getElementById('stat-road').textContent = road;
  document.getElementById('stat-drive').textContent = drive;
  document.getElementById('stat-park').textContent = park;
  document.getElementById('stat-bld').textContent = buildings.length;
  document.getElementById('stat-size').textContent =
    `${(COLS * TILE_SIZE).toFixed(0)}×${(ROWS * TILE_SIZE).toFixed(0)}m`;
}

// ── EXPORT map.json ───────────────────────────────────────────
document.getElementById('btn-export').addEventListener('click', () => {
  // Run-length encode tiles for compact storage
  let tileStr = '';
  for (let i = 0; i < tiles.length; i++) tileStr += String.fromCharCode(tiles[i]);

  const data = {
    cols: COLS,
    rows: ROWS,
    tileSize: TILE_SIZE,
    tiles: tileStr,
    buildings: buildings.map(b => ({
      col: b.col, row: b.row,
      w: b.w, d: b.d, rot: b.rot || 0,
    })),
    spawnPoint: { col: spawnPoint.col, row: spawnPoint.row, angle: spawnPoint.angle || 0 },
    tileTypes: TILES, // embed tile definitions for game reference
  };

  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'map.json'; a.click();
  URL.revokeObjectURL(url);
  showToast('Exported map.json — drop it next to truck-game-v2.html');
});

// ── LOAD map.json ─────────────────────────────────────────────
document.getElementById('btn-load-map').addEventListener('click', () => {
  document.getElementById('map-upload').click();
});
document.getElementById('map-upload').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      loadMapData(data);
      showToast(`Loaded map: ${data.cols}×${data.rows} tiles`);
    } catch(err) {
      alert('Failed to parse map.json: ' + err.message);
    }
  };
  reader.readAsText(file);
});

function loadMapData(data) {
  COLS = data.cols || 100;
  ROWS = data.rows || 100;
  TILE_SIZE = data.tileSize || 1.5;
  tiles = new Uint8Array(COLS * ROWS).fill('G'.charCodeAt(0));
  if (data.tiles) {
    for (let i = 0; i < Math.min(data.tiles.length, tiles.length); i++)
      tiles[i] = data.tiles.charCodeAt(i);
  }
  buildings = data.buildings || [];
  spawnPoint = data.spawnPoint || { col: Math.floor(COLS/2), row: Math.floor(ROWS/2), angle: 0 };
  document.getElementById('map-cols').value = COLS;
  document.getElementById('map-rows').value = ROWS;
  document.getElementById('tile-size').value = TILE_SIZE;
  fitView();
}

// ── CLEAR ─────────────────────────────────────────────────────
document.getElementById('btn-clear').addEventListener('click', () => {
  if (!confirm('Clear all tiles and buildings?')) return;
  tiles.fill('G'.charCodeAt(0));
  buildings = [];
  spawnPoint = { col: Math.floor(COLS/2), row: Math.floor(ROWS/2), angle: 0 };
  render();
});

// ── TOAST ─────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = '0', 3000);
}

// ── INIT ──────────────────────────────────────────────────────
resizeCanvases();
fitView();
</script>
</body>
